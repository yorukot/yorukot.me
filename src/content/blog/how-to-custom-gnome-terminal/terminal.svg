<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
    <title id="title">Terminal preview</title>
    <desc id="desc">A dark terminal window with a small shell prompt.</desc>
    <rect width="1200" height="675" fill="#000000"/>
    <rect x="90" y="90" width="1020" height="495" fill="#0b0b0b" stroke="#303030" stroke-width="2"/>
    <rect x="90" y="90" width="1020" height="52" fill="#171717" stroke="#303030" stroke-width="2"/>
    <circle cx="124" cy="116" r="8" fill="#ff5f56"/>
    <circle cx="152" cy="116" r="8" fill="#ffbd2e"/>
    <circle cx="180" cy="116" r="8" fill="#27c93f"/>
    <text x="128" y="226" fill="#c7c7c7" font-family="monospace" font-size="34">$ zsh</text>
    <text x="128" y="286" fill="#ff9642" font-family="monospace" font-size="34">yorukot@ubuntu</text>
    <text x="128" y="346" fill="#c7c7c7" font-family="monospace" font-size="34">~/terminal/theme</text>
    <text x="128" y="426" fill="#c7c7c7" font-family="monospace" font-size="34">Open source when possible</text>
</svg>
